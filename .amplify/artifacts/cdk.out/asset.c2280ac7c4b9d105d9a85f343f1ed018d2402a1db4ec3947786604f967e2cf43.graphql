type RangerAlert {
  parkName: String!
  geofenceId: String
  title: String!
  detail: String!
  alertType: String!
  source: String!
  id: ID!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

input AmplifyAIConversationTurnErrorInput {
  errorType: String!
  message: String!
}

input ModelStringInput {
  ne: String
  eq: String
  le: String
  lt: String
  ge: String
  gt: String
  contains: String
  notContains: String
  between: [String]
  beginsWith: String
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
  size: ModelSizeInput
}

input ModelIntInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

input ModelFloatInput {
  ne: Float
  eq: Float
  le: Float
  lt: Float
  ge: Float
  gt: Float
  between: [Float]
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

input ModelBooleanInput {
  ne: Boolean
  eq: Boolean
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
}

input ModelIDInput {
  ne: ID
  eq: ID
  le: ID
  lt: ID
  ge: ID
  gt: ID
  contains: ID
  notContains: ID
  between: [ID]
  beginsWith: ID
  attributeExists: Boolean
  attributeType: ModelAttributeTypes
  size: ModelSizeInput
}

input ModelSubscriptionStringInput {
  ne: String
  eq: String
  le: String
  lt: String
  ge: String
  gt: String
  contains: String
  notContains: String
  between: [String]
  beginsWith: String
  in: [String]
  notIn: [String]
}

input ModelSubscriptionIntInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
  in: [Int]
  notIn: [Int]
}

input ModelSubscriptionFloatInput {
  ne: Float
  eq: Float
  le: Float
  lt: Float
  ge: Float
  gt: Float
  between: [Float]
  in: [Float]
  notIn: [Float]
}

input ModelSubscriptionBooleanInput {
  ne: Boolean
  eq: Boolean
}

input ModelSubscriptionIDInput {
  ne: ID
  eq: ID
  le: ID
  lt: ID
  ge: ID
  gt: ID
  contains: ID
  notContains: ID
  between: [ID]
  beginsWith: ID
  in: [ID]
  notIn: [ID]
}

enum ModelAttributeTypes {
  binary
  binarySet
  bool
  list
  map
  number
  numberSet
  string
  stringSet
  _null
}

input ModelSizeInput {
  ne: Int
  eq: Int
  le: Int
  lt: Int
  ge: Int
  gt: Int
  between: [Int]
}

enum ModelSortDirection {
  ASC
  DESC
}

type ModelRangerAlertConnection {
  items: [RangerAlert]!
  nextToken: String
}

input ModelRangerAlertFilterInput {
  parkName: ModelStringInput
  geofenceId: ModelStringInput
  title: ModelStringInput
  detail: ModelStringInput
  alertType: ModelStringInput
  source: ModelStringInput
  id: ModelIDInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
  and: [ModelRangerAlertFilterInput]
  or: [ModelRangerAlertFilterInput]
  not: ModelRangerAlertFilterInput
}

type Query {
  getRangerAlert(id: ID!): RangerAlert
  listRangerAlerts(filter: ModelRangerAlertFilterInput, limit: Int, nextToken: String): ModelRangerAlertConnection
}

input ModelRangerAlertConditionInput {
  parkName: ModelStringInput
  geofenceId: ModelStringInput
  title: ModelStringInput
  detail: ModelStringInput
  alertType: ModelStringInput
  source: ModelStringInput
  and: [ModelRangerAlertConditionInput]
  or: [ModelRangerAlertConditionInput]
  not: ModelRangerAlertConditionInput
  createdAt: ModelStringInput
  updatedAt: ModelStringInput
}

input CreateRangerAlertInput {
  parkName: String!
  geofenceId: String
  title: String!
  detail: String!
  alertType: String!
  source: String!
  id: ID
}

input UpdateRangerAlertInput {
  parkName: String
  geofenceId: String
  title: String
  detail: String
  alertType: String
  source: String
  id: ID!
}

input DeleteRangerAlertInput {
  id: ID!
}

type Mutation {
  createRangerAlert(input: CreateRangerAlertInput!, condition: ModelRangerAlertConditionInput): RangerAlert
  updateRangerAlert(input: UpdateRangerAlertInput!, condition: ModelRangerAlertConditionInput): RangerAlert
  deleteRangerAlert(input: DeleteRangerAlertInput!, condition: ModelRangerAlertConditionInput): RangerAlert
}

input ModelSubscriptionRangerAlertFilterInput {
  parkName: ModelSubscriptionStringInput
  geofenceId: ModelSubscriptionStringInput
  title: ModelSubscriptionStringInput
  detail: ModelSubscriptionStringInput
  alertType: ModelSubscriptionStringInput
  source: ModelSubscriptionStringInput
  id: ModelSubscriptionIDInput
  createdAt: ModelSubscriptionStringInput
  updatedAt: ModelSubscriptionStringInput
  and: [ModelSubscriptionRangerAlertFilterInput]
  or: [ModelSubscriptionRangerAlertFilterInput]
}

type Subscription {
  onCreateRangerAlert(filter: ModelSubscriptionRangerAlertFilterInput): RangerAlert @aws_subscribe(mutations: ["createRangerAlert"])
  onUpdateRangerAlert(filter: ModelSubscriptionRangerAlertFilterInput): RangerAlert @aws_subscribe(mutations: ["updateRangerAlert"])
  onDeleteRangerAlert(filter: ModelSubscriptionRangerAlertFilterInput): RangerAlert @aws_subscribe(mutations: ["deleteRangerAlert"])
}
